services:
  postgres:
    image: postgres:17
    container_name: trans-chat-postgres
    environment:
      POSTGRES_USER: transchat
      POSTGRES_PASSWORD: transchat_password
      POSTGRES_DB: transchat
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transchat -d transchat"]
      interval: 5s
      timeout: 5s
      retries: 10

  translate-service:
    build:
      context: ./translate-service
    container_name: trans-chat-translate-service
    ports:
      - "127.0.0.1:5000:5000"

  chat-server:
    build:
      context: ./chat-server
    container_name: trans-chat-chat-server
    environment:
      PORT: 4000
      LAN_HOST: ${LAN_HOST:-}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:3000,http://127.0.0.1:3000}
      TRANSLATE_SERVICE_URL: http://translate-service:5000
      TRANSLATE_TIMEOUT_MS: 5000
      DATABASE_URL: postgresql://transchat:transchat_password@postgres:5432/transchat?schema=public
      ENABLE_ADMIN_ACTIONS: "false"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      translate-service:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_CHAT_SERVER_URL: ${NEXT_PUBLIC_CHAT_SERVER_URL:-http://${LAN_HOST:-localhost}:4000}
    container_name: trans-chat-frontend
    environment:
      NEXT_PUBLIC_CHAT_SERVER_URL: ${NEXT_PUBLIC_CHAT_SERVER_URL:-http://${LAN_HOST:-localhost}:4000}
    ports:
      - "3000:3000"
    depends_on:
      - chat-server

volumes:
  postgres-data:
